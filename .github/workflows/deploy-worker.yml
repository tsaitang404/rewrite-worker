name: Deploy Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run type-check

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REWRITE_RULES_JSON: ${{ vars.REWRITE_RULES_JSON }}
          WORKER_ROUTES: ${{ vars.WORKER_ROUTES }}
          WORKER_ZONE_NAME: ${{ vars.WORKER_ZONE_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${WORKER_ZONE_NAME}" ]; then
            echo "WORKER_ZONE_NAME is required"
            exit 1
          fi

          cp wrangler.toml wrangler.ci.toml

          {
            echo
            echo "routes = ["
            while IFS= read -r route; do
              route="${route%$'\r'}"
              # Skip empty lines so users can format WORKER_ROUTES for readability.
              if [ -n "${route}" ]; then
                echo "  { pattern = \"${route}\", zone_name = \"${WORKER_ZONE_NAME}\" },"
              fi
            done <<< "${WORKER_ROUTES}"
            echo "]"
          } >> wrangler.ci.toml

          npx wrangler deploy \
            --config wrangler.ci.toml \
            --keep-vars=true \
            --var "REWRITE_RULES:${REWRITE_RULES_JSON}"
